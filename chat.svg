<svg xmlns="http://www.w3.org/2000/svg" width="800" height="620" fill="none">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 3px #7ee787); }
      50% { filter: drop-shadow(0 0 8px #7ee787); }
    }
    .bubble { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
    .b1 { animation-delay: 0.3s; }
    .b2 { animation-delay: 0.9s; }
    .b3 { animation-delay: 1.5s; }
    .b4 { animation-delay: 2.1s; }
    .b5 { animation-delay: 2.7s; }
    .b6 { animation-delay: 3.3s; }
    .b7 { animation-delay: 3.9s; }
    .b8 { animation-delay: 4.5s; }
    .b9 { animation-delay: 5.1s; }
    .title { animation: glow 3s ease-in-out infinite; }
  </style>
  
  <rect width="800" height="620" rx="14" fill="#0d1117"/>
  
  <!-- Terminal bar -->
  <rect width="800" height="42" rx="14" fill="#161b22"/>
  <rect y="28" width="800" height="14" fill="#161b22"/>
  <circle cx="22" cy="21" r="7" fill="#ff5f57"/>
  <circle cx="44" cy="21" r="7" fill="#febc2e"/>
  <circle cx="66" cy="21" r="7" fill="#28c840"/>
  <text x="400" y="26" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="13">ali@legend ~ % ./introduce.sh</text>
  
  <!-- Name - glowing -->

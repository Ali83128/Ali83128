<svg xmlns="http://www.w3.org/2000/svg" width="820" height="540" fill="none">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes glow {

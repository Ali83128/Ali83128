    <text x="480" y="221" fill="#ffd700" font-family="Segoe UI, sans-serif" font-size="15" font-weight="700">ZERO liquidations</text>
  </g>
  
  <!-- Digital Marketing -->
  <g class="bubble b4">
    <rect x="30" y="252" width="660" height="62" rx="16" fill="#1a7f37"/>
    <text x="50" y="278" fill="#fff" font-family="Segoe UI, sans-serif" font-size="15" font-weight="600">💼 Digital Marketing Expert — Top 1% on Upwork</text>
    <text x="50" y="300" fill="#7ee787" font-family="Segoe UI, sans-serif" font-size="13">$100K+ earned • 300+ YouTube channels monetized • $900K+ revenue generated for clients</text>

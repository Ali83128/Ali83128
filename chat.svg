      50% { filter: drop-shadow(0 0 10px #39d353); }
    }
    .bubble { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .b1 { animation-delay: 0.2s; }
    .b2 { animation-delay: 0.6s; }
    .b3 { animation-delay: 1.0s; }
    .b4 { animation-delay: 1.4s; }
    .b5 { animation-delay: 1.8s; }
    .b6 { animation-delay: 2.2s; }
    .b7 { animation-delay: 2.6s; }
    .b8 { animation-delay: 3.0s; }
    .b9 { animation-delay: 3.4s; }
    .b10 { animation-delay: 3.8s; }
    .glow { animation: glow 2.5s ease-in-out infinite; }
  </style>
  

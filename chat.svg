    <text x="160" y="88" fill="#7ee787" font-family="Segoe UI, sans-serif" font-size="16">Trader • Marketer • Developer 🇵🇰</text>
  </g>
  
  <!-- Trading -->
  <g class="bubble b2">
    <rect x="30" y="118" width="620" height="62" rx="16" fill="#1a7f37"/>
    <text x="50" y="144" fill="#fff" font-family="Segoe UI, sans-serif" font-size="15" font-weight="600">📈 Crypto &amp; Forex Trading</text>
    <text x="50" y="166" fill="#7ee787" font-family="Segoe UI, sans-serif" font-size="13">Trading crypto since 2017 • Forex since 2020 • Managed client funds like a hedge fund</text>
  </g>
  
  <!-- Fund Manager -->
